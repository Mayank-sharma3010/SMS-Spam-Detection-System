# ==========================================
# Application Configuration
# ==========================================

spring.application.name=Advanced-SMS-Spam-Detection

server.port=8080

# ==========================================
# MySQL Database Configuration
# ==========================================

spring.datasource.url=jdbc:mysql://localhost:3306/spam_detector_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC

spring.datasource.username=root

spring.datasource.password=Mayank@007

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / Hibernate Configuration
# ==========================================

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ==========================================
# Thymeleaf Configuration
# ==========================================

spring.thymeleaf.prefix=classpath:/templates/

spring.thymeleaf.suffix=.html

spring.thymeleaf.cache=false

# ==========================================
# Static Resources
# ==========================================

spring.web.resources.static-locations=classpath:/static/

# ==========================================
# File Upload
# ==========================================

spring.servlet.multipart.enabled=true

spring.servlet.multipart.max-file-size=20MB

spring.servlet.multipart.max-request-size=20MB

# ==========================================
# Logging
# ==========================================

logging.level.org.springframework=INFO

logging.level.com.mayank.spamdetector=DEBUG

# ==========================================
# JWT Configuration
# ==========================================

jwt.secret=MayankSharmaSpamDetectorProjectSecretKey2026SpringBootJWT

jwt.expiration=86400000

# ==========================================
# Dataset Path
# ==========================================

dataset.path=src/main/resources/dataset/spam.csv

# ==========================================
# Machine Learning Model
# ==========================================

model.path=model/spam-model.model